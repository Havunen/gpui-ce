name: Build and Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
          - name: macOS x86_64
            runner: macos-15-intel
          - name: macOS aarch64
            runner: macos-15
          - name: Windows x86_64
            runner: windows-latest
          - name: Windows aarch64
            runner: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libasound2-dev \
            libdrm-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgbm-dev \
            libssl-dev \
            libva-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            zlib1g-dev

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace --lib --tests
